// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        // Use the modern, required repositories. jcenter is shut down.
        google()
        mavenCentral()
    }
    dependencies {
        // Upgrade the Android Gradle Plugin to a version compatible with modern libraries and SDK 34.
        // This is necessary for native Go-mobile libraries to link correctly.
        classpath 'com.android.tools.build:gradle:8.1.4'
        
        // Add the Google services classpath for Firebase integration or Location services
        classpath 'com.google.gms:google-services:4.4.1'
    }
}

// FIXED: The 'allprojects' block has been removed entirely.
// In Gradle 8.0, repository management is now strictly handled in the 'settings.gradle' file.
// Deleting this block resolves the repository conflict that leads to the "Unauthorized" error.

task clean(type: Delete) {
    delete rootProject.buildDir
}