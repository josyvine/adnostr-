<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Product Details</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    /* THEME ENGINE: Default Night Mode (Matching Native App) */
    :root {
        --primary: #002f34; 
        --secondary: #25D366; /* WhatsApp Green (Persisted) */
        --accent: #2196F3; /* Blue */
        --bg: #121212;
        --card-bg: #1E1E1E;
        --text-main: #FFFFFF;
        --text-muted: #A0A0A0;
        --price: #00a49f; /* OLX Teal (Persisted) */
        --border: #333333;
        /* NEW: ACCORDION THEME COLORS */
        --accordion-header-bg: #252525;
        --accordion-active-bg: #00a49f;
    }

    /* THEME ENGINE: Day Mode Override */
    body.day-mode {
        --bg: #F2F4F5;
        --card-bg: #FFFFFF;
        --text-main: #002f34;
        --text-muted: #406367;
        --border: #EBEDEE;
        --accordion-header-bg: #F0F2F5;
        --accordion-active-bg: #002f34;
    }

    * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }

    body { 
        margin: 0; 
        background: var(--bg); 
        color: var(--text-main); 
        padding-bottom: 80px; 
        transition: background 0.3s, color 0.3s;
    }

    /* Image Gallery */
    .gallery-container {
        background: #000;
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #mainImage {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: var(--card-bg);
    }

    .thumb-strip {
        display: flex;
        overflow-x: auto;
        padding: 10px;
        background: var(--card-bg);
        gap: 8px;
        border-bottom: 1px solid var(--border);
    }

    .thumb-strip img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 4px;
        border: 2px solid transparent;
        flex-shrink: 0;
    }

    .thumb-strip img.active {
        border-color: var(--price);
    }

    /* Content Area */
    .content { padding: 16px; background: var(--card-bg); margin-bottom: 8px; }

    .price-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .price-tag { font-size: 28px; font-weight: 900; color: var(--text-main); }
    
    .mrp-tag { 
        font-size: 14px; 
        color: var(--text-muted); 
        text-decoration: line-through; 
        margin-left: 10px; 
    }

    .share-btn {
        width: 40px; height: 40px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: var(--bg); color: var(--text-main);
        cursor: pointer;
    }

    .title { font-size: 18px; line-height: 1.4; color: var(--text-muted); margin-bottom: 12px; }

    .loc-row { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; }

    /* Section Cards */
    .section-card { background: var(--card-bg); padding: 16px; margin-bottom: 8px; }
    .section-title { 
        font-size: 16px; font-weight: 700; margin-bottom: 15px; 
        text-transform: uppercase; letter-spacing: 1px; color: var(--text-main);
    }

    /* Attributes Grid */
    .attr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .attr-item { display: flex; flex-direction: column; gap: 2px; }
    .attr-label { font-size: 12px; color: var(--text-muted); }
    .attr-value { font-size: 14px; font-weight: 500; color: var(--text-main); }

    /* NEW: ACCORDION STYLES FOR VIEWER */
    .accordion-item {
        margin-bottom: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
    }
    .accordion-header {
        background-color: var(--accordion-header-bg);
        padding: 15px 20px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-main);
        transition: 0.3s;
        text-transform: uppercase;
    }
    .accordion-header.active {
        background-color: var(--accordion-active-bg);
        color: #fff;
    }
    .accordion-header .icon {
        font-size: 12px;
        transition: transform 0.3s ease;
    }
    .accordion-header.active .icon {
        transform: rotate(90deg);
    }
    .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease-out;
        background: var(--card-bg);
    }
    .accordion-content.show {
        padding: 15px 0;
        max-height: 2000px;
    }

    /* Description */
    .desc-text { font-size: 15px; line-height: 1.6; color: var(--text-muted); white-space: pre-line; }

    /* Seller Info */
    .section-card { background: var(--card-bg); padding: 16px; margin-bottom: 8px; }
    .seller-card { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
    .seller-avatar { 
        width: 50px; height: 50px; background: var(--bg); 
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-weight: 700; color: var(--price); font-size: 20px;
    }
    .seller-meta { flex: 1; }
    .seller-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    .seller-joined { font-size: 12px; color: var(--text-muted); }

    /* Sticky Bottom Bar */
    .action-bar {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background: var(--card-bg); padding: 12px 16px;
        display: flex; gap: 12px; box-shadow: 0 -4px 10px rgba(0,0,0,0.08);
    }

    .btn {
        flex: 1; height: 48px; border-radius: 4px; display: flex;
        align-items: center; justify-content: center; gap: 8px;
        text-decoration: none; font-weight: 700; font-size: 15px;
    }

    .btn-chat { background: var(--text-main); color: var(--card-bg); }
    .btn-call { border: 2px solid var(--text-main); color: var(--text-main); }
    .btn-whatsapp { background: var(--secondary); color: #fff; }

    /* Featured Badge */
    .featured-badge {
        position: absolute; top: 12px; left: 12px;
        background: #ffce32; color: #002f34;
        padding: 4px 8px; font-size: 11px; font-weight: 700;
        border-radius: 2px; text-transform: uppercase;
    }

</style>
</head>

<body>

    <!-- GALLERY -->
    <div class="gallery-container">
        <span id="featuredBadge" class="featured-badge" style="display:none;">Featured</span>
        <img id="mainImage" src="" alt="Product Image">
    </div>
    <div class="thumb-strip" id="thumbStrip">
        <!-- JS will populate thumbnails -->
    </div>

    <!-- MAIN DETAILS -->
    <div class="content">
        <div class="price-row">
            <div class="price-tag" id="priceDisplay">₹ 0</div>
            <div class="share-btn" id="btnShare"><i class="fa-solid fa-share-nodes"></i></div>
        </div>
        <div id="mrpRow" style="margin-top: -10px; margin-bottom: 10px; display: none;">
            <span class="mrp-tag" id="mrpDisplay">MRP ₹ 0</span>
            <span id="discountBadge" style="color: var(--secondary); font-size: 12px; font-weight: 700;"></span>
        </div>
        <div class="title" id="titleDisplay">Loading product...</div>
        <div class="loc-row">
            <i class="fa-solid fa-location-dot"></i>
            <span id="locationDisplay">Location</span>
        </div>
    </div>

    <!-- SPECIFICATIONS (DYNAMIC CONTAINER) -->
    <div class="section-card" id="specsSection">
        <div class="section-title">Details & Specs</div>
        <div id="specsDynamicContainer">
            <!-- JS will inject Grid or Accordion here -->
        </div>
    </div>

    <!-- DESCRIPTION -->
    <div class="section-card">
        <div class="section-title">Description</div>
        <div class="desc-text" id="descDisplay">
            No description provided.
        </div>
    </div>

    <!-- SELLER INFO -->
    <div class="section-card">
        <div class="section-title">Seller Information</div>
        <div class="seller-card">
            <div class="seller-avatar" id="sellerInitial">S</div>
            <div class="seller-meta">
                <div class="seller-name" id="sellerName">Seller Name</div>
                <div class="seller-joined">✔ Verified AdNostr Seller</div>
            </div>
        </div>
    </div>

    <!-- STICKY ACTION BAR -->
    <div class="action-bar">
        <a href="#" id="callBtn" class="btn btn-call">
            <i class="fa-solid fa-phone"></i> Call
        </a>
        <a href="#" id="chatBtn" class="btn btn-chat">
            <i class="fa-solid fa-comment-dots"></i> Chat
        </a>
        <a href="#" id="waBtn" class="btn btn-whatsapp" style="display:none;">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
    </div>

    <script>
        let templateMode = "NORMAL"; // 'NORMAL' or 'SEGREGATED'

        /**
         * TOTAL SURVEILLANCE: Interaction Bridge
         */
        function logAction(id) {
            if (window.AndroidBridge) {
                window.AndroidBridge.logTechnicalEvent("[VIEWER_ACTION] User clicked " + id);
            }
        }

        function logGlitch(type, details) {
            if (window.AndroidBridge && window.AndroidBridge.reportGlitchedLogic) {
                window.AndroidBridge.reportGlitchedLogic(type, details);
            }
        }

        // Attach listeners to static buttons
        document.getElementById('callBtn').addEventListener('click', () => logAction('CallButton'));
        document.getElementById('chatBtn').addEventListener('click', () => logAction('ChatButton'));
        document.getElementById('waBtn').addEventListener('click', () => logAction('WhatsAppButton'));
        document.getElementById('btnShare').addEventListener('click', () => logAction('ShareButton'));

        /**
         * THEME ENGINE: Bridge to native Day/Night mode
         */
        window.setTheme = function(theme) {
            if (theme === 'day') {
                document.body.classList.add('day-mode');
            } else {
                document.body.classList.remove('day-mode');
            }
        };

        /**
         * STRUCTURAL UPGRADE: Set Template Mode
         */
        window.setTemplateMode = function(mode) {
            templateMode = mode;
        };

        /**
         * Intelligent icon mapper based on the dynamic spec key.
         */
        function getIconForSpec(key) {
            const k = key.toLowerCase();
            if(k.includes('km') || k.includes('mileage') || k.includes('speed')) return 'fa-solid fa-gauge';
            if(k.includes('fuel') || k.includes('gas')) return 'fa-solid fa-gas-pump';
            if(k.includes('transmission') || k.includes('gear')) return 'fa-solid fa-gears';
            if(k.includes('power') || k.includes('voltage') || k.includes('watt')) return 'fa-solid fa-bolt';
            if(k.includes('bed') || k.includes('bath') || k.includes('room')) return 'fa-solid fa-bed';
            if(k.includes('area') || k.includes('dimension') || k.includes('size')) return 'fa-solid fa-maximize';
            if(k.includes('ram') || k.includes('processor') || k.includes('gpu') || k.includes('cpu')) return 'fa-solid fa-microchip';
            if(k.includes('storage') || k.includes('capacity') || k.includes('disk')) return 'fa-solid fa-hard-drive';
            if(k.includes('camera') || k.includes('lens') || k.includes('pixel')) return 'fa-solid fa-camera';
            if(k.includes('screen') || k.includes('display') || k.includes('resolution')) return 'fa-solid fa-display';
            if(k.includes('year') || k.includes('age') || k.includes('date')) return 'fa-solid fa-calendar-days';
            if(k.includes('weight') || k.includes('mass')) return 'fa-solid fa-weight-hanging';
            if(k.includes('color') || k.includes('paint')) return 'fa-solid fa-palette';
            if(k.includes('material') || k.includes('fabric')) return 'fa-solid fa-layer-group';
            if(k.includes('brand') || k.includes('model') || k.includes('category')) return 'fa-solid fa-tag';
            if(k.includes('salary') || k.includes('price') || k.includes('fee')) return 'fa-solid fa-money-bill';
            if(k.includes('experience') || k.includes('skill')) return 'fa-solid fa-briefcase';
            if(k.includes('warranty') || k.includes('guarantee')) return 'fa-solid fa-shield-halved';
            if(k.includes('condition') || k.includes('state')) return 'fa-solid fa-clipboard-check';
            return 'fa-solid fa-circle-check'; 
        }

        function formatLabel(key) {
            return key.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        function createSpecHTML(key, value) {
            if(!value || value.toString().trim() === '') return '';
            const icon = getIconForSpec(key);
            const label = formatLabel(key);
            return `
            <div class="attr-item">
                <span class="attr-label"><i class="${icon}" style="margin-right: 4px; opacity: 0.8;"></i>${label}</span>
                <span class="attr-value">${value}</span>
            </div>`;
        }

        /**
         * NEW: SLIDING ANIMATION SCRIPT
         */
        function toggleAccordion(header) {
            header.classList.toggle('active');
            const content = header.nextElementSibling;
            if (content.classList.contains('show')) {
                content.style.maxHeight = '0';
                content.classList.remove('show');
            } else {
                const parent = header.closest('#specsDynamicContainer');
                parent.querySelectorAll('.accordion-content.show').forEach(openContent => {
                    openContent.style.maxHeight = '0';
                    openContent.classList.remove('show');
                    openContent.previousElementSibling.classList.remove('active');
                });
                content.style.maxHeight = content.scrollHeight + 'px';
                content.classList.add('show');
            }
        }

        /**
         * Main render entry point.
         */
        function renderProduct(jsonString) {
            const startTime = Date.now();
            try {
                const data = JSON.parse(jsonString);

                // Title & Price
                document.getElementById('titleDisplay').innerText = data.title;
                document.getElementById('priceDisplay').innerText = "₹ " + data.price;
                if (data.mrp && parseInt(data.mrp) > parseInt(data.price)) {
                    document.getElementById('mrpRow').style.display = "block";
                    document.getElementById('mrpDisplay').innerText = "MRP ₹ " + data.mrp;
                    let savings = Math.round(((data.mrp - data.price) / data.mrp) * 100);
                    document.getElementById('discountBadge').innerText = savings + "% OFF";
                }

                // Images
                if (data.images && data.images.length > 0) {
                    const mainImg = document.getElementById('mainImage');
                    mainImg.src = data.images[0];
                    const strip = document.getElementById('thumbStrip');
                    strip.innerHTML = "";
                    data.images.forEach((url, index) => {
                        const img = document.createElement('img');
                        img.src = url;
                        if(index === 0) img.className = "active";
                        img.onclick = function() {
                            logAction('GalleryThumb_' + index);
                            mainImg.src = url;
                            document.querySelectorAll('.thumb-strip img').forEach(t => t.classList.remove('active'));
                            img.classList.add('active');
                        };
                        strip.appendChild(img);
                    });
                }

                // Location
                document.getElementById('locationDisplay').innerText = data.location.city + " (" + data.location.pincode + ")";

                // =========================================================================
                // STRUCTURAL UPGRADE: FORK RENDERING BY TEMPLATE MODE
                // =========================================================================
                const specsContainer = document.getElementById('specsDynamicContainer');
                specsContainer.innerHTML = '';
                const specsJSON = data.specifications || data.specs || {};

                if (templateMode === "SEGREGATED") {
                    // SLIDER MODE (Accordion)
                    let html = '';
                    const isNested = Object.values(specsJSON).some(v => typeof v === 'object' && !Array.isArray(v) && v !== null);

                    if (isNested) {
                        for (const section in specsJSON) {
                            html += `
                            <div class="accordion-item">
                                <div class="accordion-header" onclick="toggleAccordion(this)">
                                    ${formatLabel(section)} <i class="fas fa-chevron-right icon"></i>
                                </div>
                                <div class="accordion-content">
                                    <div class="attr-grid" style="padding: 0 16px 15px 16px;">
                                        ${renderGridFromObject(specsJSON[section])}
                                    </div>
                                </div>
                            </div>`;
                        }
                    } else {
                        // Fallback: Put flat specs in one slider
                        html += `
                        <div class="accordion-item">
                            <div class="accordion-header" onclick="toggleAccordion(this)">General Details <i class="fas fa-chevron-right icon"></i></div>
                            <div class="accordion-content"><div class="attr-grid" style="padding: 0 16px 15px 16px;">${renderGridFromObject(specsJSON)}</div></div>
                        </div>`;
                    }

                    // INTELLIGENT MAPPING: Add Availability Section
                    html += `
                    <div class="accordion-item">
                        <div class="accordion-header" onclick="toggleAccordion(this)">
                            Availability & Important Notes <i class="fas fa-chevron-right icon"></i>
                        </div>
                        <div class="accordion-content">
                            <div class="attr-grid" style="padding: 0 16px 15px 16px;">
                                ${createSpecHTML('stock', data.inventory.quantity + ' Units')}
                                ${createSpecHTML('delivery', data.delivery.type)}
                                ${createSpecHTML('time', data.delivery.estimated_time)}
                            </div>
                        </div>
                    </div>`;
                    specsContainer.innerHTML = html;
                } else {
                    // NORMAL MODE (Existing Flat Grid)
                    let specsHtml = '';
                    if (data.category) specsHtml += createSpecHTML('category', data.category);

                    // Flatten nested logic for the grid
                    const flattenAndRender = (obj) => {
                        let innerHtml = '';
                        for (const [key, value] of Object.entries(obj)) {
                            if (typeof value === 'object' && !Array.isArray(value) && value !== null) {
                                innerHtml += flattenAndRender(value);
                            } else {
                                innerHtml += createSpecHTML(key, value);
                            }
                        }
                        return innerHtml;
                    };

                    specsHtml += flattenAndRender(specsJSON);
                    specsHtml += createSpecHTML('delivery', data.delivery.type);
                    specsHtml += createSpecHTML('stock', data.inventory.quantity + ' Units');
                    
                    specsContainer.innerHTML = `<div class="attr-grid">${specsHtml}</div>`;
                }

                // Description
                document.getElementById('descDisplay').innerText = data.description;
                // Seller
                document.getElementById('sellerName').innerText = data.seller.name;
                document.getElementById('sellerInitial').innerText = data.seller.name.charAt(0).toUpperCase();
                // Action Buttons
                if (data.seller.show_phone && data.seller.phone) {
                    document.getElementById('callBtn').href = "tel:" + data.seller.phone;
                    document.getElementById('waBtn').href = "https://wa.me/" + data.seller.phone.replace(/\D/g,'');
                    document.getElementById('waBtn').style.display = "flex";
                } else {
                    document.getElementById('callBtn').style.display = "none";
                }
                if (!data.seller.enable_chat) document.getElementById('chatBtn').style.display = "none";
                if (data.is_featured) document.getElementById('featuredBadge').style.display = "block";

                if (window.AndroidBridge) window.AndroidBridge.logTechnicalEvent("[PERFORMANCE] Viewer Render in " + templateMode + " took " + (Date.now() - startTime) + "ms");
            } catch (e) {
                logGlitch("JSON_PARSE_FAILURE", e.message);
                document.body.innerHTML = "<div style='padding:50px; text-align:center;'>Error loading product data.</div>";
            }
        }

        function renderGridFromObject(obj) {
            let html = '';
            for (const [key, value] of Object.entries(obj)) {
                if (typeof value === 'object' && !Array.isArray(value) && value !== null) {
                    for (const [subK, subV] of Object.entries(value)) {
                        html += createSpecHTML(subK, subV);
                    }
                } else {
                    html += createSpecHTML(key, value);
                }
            }
            return html;
        }
    </script>
</body>
</html>
