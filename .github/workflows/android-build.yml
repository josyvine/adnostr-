name: Build AdNostr APK 

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # STEP: Download the large AAR file directly to the build server
      # This bypasses the GitHub 25MB upload limit
      - name: Download Datahop AAR
        run: |
          mkdir -p app/libs
          curl -L https://github.com/datahop/ipfs-lite/releases/download/v0.0.15/datahop.aar -o app/libs/datahop.aar

      # STEP: Verify the file exists and check its size
      # If this step shows 0 bytes, the build will fail here instead of during compilation
      - name: Check AAR presence
        run: ls -lh app/libs/

      # Decode the Keystore file from your GitHub Secrets
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0'
          cache-disabled: true
          arguments: app:assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Upload the signed RELEASE APK as an artifact
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: AdNostr-Release.apk
          path: app/build/outputs/apk/release/app-release.apk