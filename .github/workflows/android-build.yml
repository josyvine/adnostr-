name: Build AdNostr APK 

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Install Gradle CLI (needed to generate wrapper)
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip gradle-8.0-bin.zip
          sudo mv gradle-8.0 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      # 🔥 Generate Gradle Wrapper automatically
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.0

      # Clean build (now wrapper exists) - MOVED HERE
      - name: Gradle Clean
        run: ./gradlew clean

      # ============================================================
      # ✅ FIXED: Manual AAR Download Removed
      # The raw Go binary (v0.0.15) has been replaced by the official 
      # Datahop Android SDK which is now automatically downloaded 
      # by Gradle via JitPack.
      # ============================================================

      # Decode signing keystore
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      # Build release APK
      - name: Build Release APK
        run: ./gradlew app:assembleRelease --no-build-cache --refresh-dependencies
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          JITPACK_TOKEN: ${{ secrets.JITPACK_TOKEN }}

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AdNostr-Release.apk
          path: app/build/outputs/apk/release/app-release.apk
