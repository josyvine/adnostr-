name: Build AdNostr APK 

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Install Gradle CLI (needed to generate wrapper)
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip gradle-8.0-bin.zip
          sudo mv gradle-8.0 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      # 🔥 Generate Gradle Wrapper automatically
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.0

      # Download the 65MB Datahop AAR
      - name: Download Datahop AAR
        run: |
          mkdir -p app/libs
          curl -L https://github.com/datahop/ipfs-lite/releases/download/v0.0.15/datahop.aar -o app/libs/datahop.aar

      - name: Verify AAR
        run: ls -lh app/libs/

      # Decode signing keystore
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      # Clean build (now wrapper exists)
      - name: Gradle Clean
        run: ./gradlew clean

      # Build release APK
      - name: Build Release APK
        run: ./gradlew app:assembleRelease --no-build-cache --refresh-dependencies
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AdNostr-Release.apk
          path: app/build/outputs/apk/release/app-release.apk