pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    // FIXED: Enforces that all project dependencies use the repositories defined here.
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    
    repositories {
        google()
        mavenCentral()
        
        // FIXED: Using JitPack to host the Datahop P2P library.
        // I removed the old Bintray link because that service has been shut down.
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "AdNostr"
include ':app'