pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    // FIXED: This ensures that all libraries (including P2P ones) 
    // are looked up using the central settings below.
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    
    repositories {
        google()
        mavenCentral()
        
        // FIXED: Adding JitPack here allows the app to find the IPFS-Lite 
        // library without requiring a login or token.
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "AdNostr"
include ':app'