pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        
        // FIXED: Adding the Datahop Maven repository. 
        // This repo hosts pre-compiled P2P libraries, bypassing the 
        // build-on-demand failures and 401 errors from JitPack.
        maven { url "https://dl.bintray.com/datahop/ipfs-lite" }
        
        // Keeping JitPack as a secondary for other standard libraries
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "AdNostr"
include ':app'